<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
    {% set hf = heading_font | default('Cormorant Garamond') %}
    {% set bf = body_font | default('Lato') %}
    @import url('https://fonts.googleapis.com/css2?family={{ hf | replace(" ", "+") }}:ital,wght@0,300;0,400;1,400&family={{ bf | replace(" ", "+") }}:ital,wght@0,300;0,400;1,300&display=swap');

    @page {
        size: 5in 7in;
        margin: 0;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        width: 5in;
        height: 7in;
        overflow: hidden;
        background-color: #fffdf9;
        font-family: '{{ body_font | default("Lato") }}', sans-serif;
        font-weight: 300;
        color: #3a2e28;
    }

    /* Outer page */
    .page {
        width: 5in;
        height: 7in;
        padding: 0.48in 0.52in;
        position: relative;
        text-align: center;
    }

    /* Block spacers — must be div, not span, for height to apply */
    .spacer-xs  { display: block; height: 0.1in;  line-height: 0; font-size: 0; }
    .spacer-sm  { display: block; height: 0.14in; line-height: 0; font-size: 0; }
    .spacer-md  { display: block; height: 0.18in; line-height: 0; font-size: 0; }

    /* Single elegant border */
    .page::after {
        content: '';
        position: absolute;
        top: 0.22in;
        left: 0.22in;
        right: 0.22in;
        bottom: 0.22in;
        border: 0.75pt solid {{ primary_color }};
        opacity: 0.7;
        pointer-events: none;
    }

    /* ── Top ornament ─────────────────────────────────── */
    .ornament {
        display: block;
        font-size: 13pt;
        color: {{ primary_color }};
        letter-spacing: 0.12in;
        line-height: 1;
        text-align: center;
    }

    /* ── Tagline ──────────────────────────────────────── */
    .tagline {
        display: block;
        font-family: 'Lato', sans-serif;
        font-weight: 300;
        font-size: 6pt;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: {{ primary_color }};
        text-align: center;
        margin: 0.09in auto;
        max-width: 3.2in;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
    }

    /* ── Divider — must be centered explicitly ────────── */
    .divider {
        display: flex;
        align-items: center;
        gap: 0.07in;
        width: 3in;
        margin: 0 auto;           /* centers the block element */
    }
    .divider-line {
        flex: 1;
        height: 0.5pt;
        background: {{ primary_color }};
        opacity: 0.4;
    }
    .divider-diamond {
        font-size: 5pt;
        color: {{ primary_color }};
        line-height: 1;
        opacity: 0.65;
    }

    /* ── Names ────────────────────────────────────────── */
    .request-line {
        display: block;
        font-family: 'Lato', sans-serif;
        font-weight: 300;
        font-size: 6.5pt;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: #9a8a80;
        margin-bottom: 0.1in;
    }
    .names-block {
        text-align: center;
    }
    .partner-name {
        font-family: '{{ heading_font | default("Cormorant Garamond") }}', serif;
        font-size: 19pt;
        font-weight: 300;
        letter-spacing: 0.03em;
        color: #2c2420;
        line-height: 1.25;
        display: block;
        width: 100%;
        text-align: center;
    }
    .ampersand {
        font-family: '{{ heading_font | default("Cormorant Garamond") }}', serif;
        font-style: italic;
        font-weight: 300;
        font-size: 13pt;
        color: {{ primary_color }};
        display: block;
        margin: 0.04in 0;
        line-height: 1;
    }

    /* ── Invitation body text ─────────────────────────── */
    .invite-body {
        display: block;
        font-family: 'Lato', sans-serif;
        font-weight: 300;
        font-size: 8.5pt;
        line-height: 1.75;
        text-align: center;
        color: #4a3e38;
        max-width: 3.2in;
        max-height: 1in;
        overflow: hidden;
        margin: 0.08in auto 0;
        white-space: pre-line;
    }

    /* ── Date & Venue block ───────────────────────────── */
    .details-block {
        text-align: center;
    }
    .wedding-date {
        font-family: 'Lato', sans-serif;
        font-style: italic;
        font-weight: 300;
        font-size: 8.5pt;
        color: #2c2420;
        line-height: 1.6;
        margin-bottom: 0.1in;
    }
    .venue-name {
        font-family: 'Lato', sans-serif;
        font-weight: 400;
        font-size: 7.5pt;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: {{ primary_color }};
        margin-bottom: 4px;
    }
    .venue-location {
        font-family: 'Lato', sans-serif;
        font-weight: 300;
        font-size: 7pt;
        color: #7a6a60;
        letter-spacing: 0.04em;
    }

    /* ── RSVP block ───────────────────────────────────── */
    .rsvp-divider {
        display: block;
        width: 1.6in;
        height: 0.5pt;
        background: {{ primary_color }};
        opacity: 0.3;
        margin: 0.14in auto;
    }
    .rsvp-block {
        text-align: center;
    }
    .rsvp-label {
        font-family: 'Lato', sans-serif;
        font-weight: 400;
        font-size: 6pt;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        color: #9a8a80;
        margin-bottom: 3px;
    }
    .rsvp-info {
        font-family: 'Lato', sans-serif;
        font-weight: 300;
        font-size: 7.5pt;
        color: #4a3e38;
        letter-spacing: 0.02em;
    }

    /* ── Footer ornament ──────────────────────────────── */
    .footer-ornament {
        display: block;
        font-size: 8pt;
        color: {{ primary_color }};
        letter-spacing: 0.1in;
        text-align: center;
    }
</style>
</head>
<body>
<div class="page">

    <div class="spacer-sm"></div>
    <div class="ornament">✦</div>
    <div class="tagline">{{ tagline }}</div>

    <div class="divider"><div class="divider-line"></div><div class="divider-diamond">◆</div><div class="divider-line"></div></div>
    <div class="spacer-sm"></div>

    <div class="names-block">
        <p class="request-line">Together with their families</p>
        <span class="partner-name">{{ partner1_name }}</span>
        <span class="ampersand">&amp;</span>
        <span class="partner-name">{{ partner2_name }}</span>
    </div>
    <div class="spacer-sm"></div>

    <div class="divider"><div class="divider-line"></div><div class="divider-diamond">◆</div><div class="divider-line"></div></div>

    <div class="invite-body">{{ invitation_text }}</div>
    <div class="spacer-md"></div>

    <div class="divider"><div class="divider-line"></div><div class="divider-diamond">◆</div><div class="divider-line"></div></div>
    <div class="spacer-sm"></div>

    <div class="details-block">
        <p class="wedding-date">{{ wedding_date }}{% if ceremony_time %}<br>{{ ceremony_time }}{% endif %}</p>
        <p class="venue-name">{{ venue_name }}</p>
        <p class="venue-location">{{ location }}</p>
    </div>

    {% if rsvp_info %}
    <div class="rsvp-divider"></div>
    <div class="rsvp-block">
        <p class="rsvp-label">Kindly Reply By</p>
        <p class="rsvp-info">{{ rsvp_info }}</p>
    </div>
    {% endif %}

    <div class="spacer-md"></div>
    <div class="footer-ornament">✦ · ✦</div>

</div>
</body>
</html>
