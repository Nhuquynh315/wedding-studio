{% if guests_page.pages > 1 %}
<ul class="pagination pagination-sm justify-content-center mb-0">
    <li class="page-item{% if not guests_page.has_prev %} disabled{% endif %}">
        <a class="page-link guest-page-link" href="#" data-page="{{ guests_page.prev_num }}">&laquo;</a>
    </li>
    {% for p in guests_page.iter_pages(left_edge=1, right_edge=1, left_current=2, right_current=2) %}
    {% if p %}
    <li class="page-item{% if p == guests_page.page %} active{% endif %}">
        <a class="page-link guest-page-link" href="#" data-page="{{ p }}">{{ p }}</a>
    </li>
    {% else %}
    <li class="page-item disabled"><span class="page-link">…</span></li>
    {% endif %}
    {% endfor %}
    <li class="page-item{% if not guests_page.has_next %} disabled{% endif %}">
        <a class="page-link guest-page-link" href="#" data-page="{{ guests_page.next_num }}">&raquo;</a>
    </li>
</ul>
{% endif %}
